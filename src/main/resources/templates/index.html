<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Analyzer</title>

    <link rel="stylesheet" href="/style.css">
</head>

<body>

    <div class="container">

        <h1>AI Resume Analyzer</h1>

        <p>Upload your resume PDF and get ATS Score.</p>

        <form id="uploadForm" enctype="multipart/form-data">

            <input type="file"
                   id="resumeFile"
                   name="file"
                   accept=".pdf"
                   required>

            <button type="button"
                    onclick="uploadResume()">
                Analyze Resume
            </button>

        </form>

        <div id="loading"></div>

        <div class="result-box">
           
            <pre id="result"></pre>
        </div>

        <br>

        <a href="/history" class="history-btn">
            View Resume History
        </a>

        <div class="footer">
            Built using Spring Boot + MySQL + PDFBox
        </div>

    </div>

    <script src="/script.js"></script>

</body>
</html>
